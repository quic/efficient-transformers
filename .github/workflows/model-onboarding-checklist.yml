name: Model Onboarding Checklist

on:
  pull_request:
    types: [labeled, unlabeled, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  model-onboarding-checklist:
    name: Check opt-in model onboarding checklist
    if: >
      contains(github.event.pull_request.labels.*.name, 'check:model-onboarding') ||
      contains(github.event.pull_request.labels.*.name, 'check:model-llm') ||
      contains(github.event.pull_request.labels.*.name, 'check:model-vlm') ||
      contains(github.event.pull_request.labels.*.name, 'check:model-moe') ||
      contains(github.event.pull_request.labels.*.name, 'check:model-embedding') ||
      contains(github.event.pull_request.labels.*.name, 'check:model-diffusion')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate checklist
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: scripts/check_model_onboarding_pr.sh
