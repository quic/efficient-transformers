name: Docs Release

on:
  push:
    branches:
      - "release/v*"
    tags:
      - "v*"
  delete:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install doc dependencies
        run: |
          pip install "mkdocs>=1.6" "mkdocs-material>=9.5" "mkdocstrings[python]>=0.25" "mike>=2.0"
          pip install -e . --no-deps --no-build-isolation

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy release branch
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/v')
        run: |
          if [ ! -f mkdocs.yml ]; then
            echo "No mkdocs.yml on this branch — skipping"
            exit 0
          fi
          BRANCH_VERSION="${GITHUB_REF#refs/heads/release/}"
          mike deploy --push "$BRANCH_VERSION"

      - name: Deploy stable tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          mike deploy --push --update-aliases "$TAG_VERSION" stable
          mike set-default --push stable

      - name: Delete docs version on branch delete
        if: >
          github.event_name == 'delete' &&
          github.event.ref_type == 'branch' &&
          startsWith(github.event.ref, 'release/v')
        run: |
          VERSION="${{ github.event.ref }}"
          VERSION="${VERSION#release/}"
          mike delete --push "$VERSION"
