name: Unit Tests

on:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          pip install -e ".[test]"
          pip install onnx_ir

      - name: Run unit tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGINGFACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: pytest tests/unit_test/ -n auto -v

  dynamo-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-dynamo-${{ hashFiles('pyproject.toml') }}-torch2.13
          restore-keys: |
            ${{ runner.os }}-pip-dynamo-

      - name: Install package and test dependencies
        run: |
          pip install -e ".[test]"
          pip install \
            'torch@https://download.pytorch.org/whl/cpu/torch-2.13.0%2Bcpu-cp312-cp312-manylinux_2_28_x86_64.whl' \
            'torchvision@https://download.pytorch.org/whl/cpu/torchvision-0.28.0%2Bcpu-cp312-cp312-manylinux_2_28_x86_64.whl' \
            'compressed-tensors==0.17.0' \
            'onnxscript==0.6.2' \
            onnx_ir

      - name: Run dynamo CPU tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGINGFACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pytest tests/dynamo/ \
            -m "not on_qaic" \
            -n auto -v
